        <input id="nome" placeholder="Nome"><br><br>

        <select id="hora"></select>

        <p id="resposta"></p>

        <script>
            const horariosFixos = ['10:00', '12:00', '14:00', '16:00', '18:00', '20:00'];
            
            async function carregarHorarios() {
                console.log("função chamada");
                const data = document.getElementById('data').value;
                console.log("data:", data);
                
                
            if (!data) return;

            const res = await fetch(`/horarios/${data}`);
            const dados = await res.json();
                console.log(dados);
            const ocupados = dados.ocupados;

            const select = document.getElementById('hora');
            select.innerHTML = '';

            const livres = horariosFixos.filter(h => !ocupados.includes(h));

            livres.forEach(hora => {
                const option = document.createElement('option');
                option.value = hora;
                option.textContent = hora;
                select.appendChild(option);
            });

            if (livres.length === 0) {
                const option = document.createElement('option');
                option.textContent = 'Sem horários disponíveis';
                select.appendChild(option);
            }
            }


            const hoje = new Date();

            // amanhã
            const amanha = new Date();
            amanha.setDate(hoje.getDate() + 1);

            // +10 dias
            const limite = new Date();
            limite.setDate(hoje.getDate() + 10);

            // formatar YYYY-MM-DD
            function formatarData(data) {
            return data.toISOString().split('T')[0];
            }

            document.getElementById('data').min = formatarData(amanha);
            document.getElementById('data').max = formatarData(limite);
